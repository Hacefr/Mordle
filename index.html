<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mordle: Slight Type</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.css">
    <link rel="stylesheet" href="entities.css">
</head>
<body>
    <div id="toast-container"></div>
    <div id="mordle-root"></div>

    <script type="module">
        async function loadStructure() {
            const root = document.getElementById('mordle-root');
            const menu = await fetch('./menu.html').then(r => r.text());
            const modals = await fetch('./modals.html').then(r => r.text());
            const arena = await fetch('./arena.html').then(r => r.text());
            root.innerHTML = menu + modals + arena;
            
            const script = document.createElement('script');
            script.type = 'module';
            script.src = 'chaos.js';
            document.body.appendChild(script);
        }
        loadStructure();
    </script>
</body>
</html>
